<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>労務書類送信</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .icon {
      width: 40px;
      height: 40px;
      background: #e8f4fd;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a2b3c;
    }

    header p {
      font-size: 12px;
      color: #7a8a9a;
      margin-top: 2px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: #4a6785;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 18px 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-camera {
      background: #1a73e8;
      color: #fff;
      box-shadow: 0 2px 8px rgba(26,115,232,0.3);
    }

    .btn-file {
      background: #fff;
      color: #1a73e8;
      border: 2px solid #1a73e8;
    }

    .btn .btn-icon {
      font-size: 26px;
    }

    .btn .btn-label {
      font-size: 13px;
    }

    /* プレビューエリア */
    #preview-area {
      margin-top: 16px;
    }

    #preview-area:empty {
      display: none;
    }

    .preview-label {
      font-size: 13px;
      color: #7a8a9a;
      margin-bottom: 10px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
    }

    .preview-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: #f0f4f8;
      aspect-ratio: 1;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .preview-item .file-icon {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
    }

    .preview-item .file-icon .fi-icon {
      font-size: 30px;
    }

    .preview-item .file-icon .fi-name {
      font-size: 10px;
      color: #4a6785;
      text-align: center;
      word-break: break-all;
      line-height: 1.3;
    }

    .preview-item .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 24px;
      height: 24px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .preview-count {
      font-size: 12px;
      color: #7a8a9a;
      margin-top: 10px;
    }

    /* メモ欄 */
    textarea {
      width: 100%;
      border: 1.5px solid #dde4ec;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      color: #1a2b3c;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #1a73e8;
    }

    textarea::placeholder {
      color: #b0bcc8;
    }

    /* 送信ボタン */
    .btn-submit {
      width: 100%;
      padding: 18px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 10px rgba(26,115,232,0.35);
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .btn-submit:disabled {
      background: #b0bcc8;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ローディング */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* メッセージ */
    .msg {
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .msg-success {
      background: #e6f4ea;
      color: #1e7e34;
      border: 1.5px solid #a8d5b5;
    }

    .msg-error {
      background: #fdecea;
      color: #c0392b;
      border: 1.5px solid #f5b7b1;
    }

    .msg-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    /* hidden input */
    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <div class="icon">📋</div>
    <div>
      <h1>労務書類送信</h1>
      <p>撮影またはファイルを選んで社労士へ送信</p>
    </div>
  </header>

  <!-- メッセージ表示エリア -->
  <div id="msg-area"></div>

  <!-- ファイル選択カード -->
  <div class="card">
    <div class="card-title">書類を追加</div>
    <div class="btn-row">
      <button class="btn btn-camera" onclick="openCamera()">
        <span class="btn-icon">📷</span>
        <span class="btn-label">カメラで撮影</span>
      </button>
      <button class="btn btn-file" onclick="openFilePicker()">
        <span class="btn-icon">📁</span>
        <span class="btn-label">ファイルを選択</span>
      </button>
    </div>

    <!-- hidden inputs -->
    <input type="file" id="input-camera" accept="image/*" capture="environment" multiple>
    <input type="file" id="input-file" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx" multiple>

    <!-- プレビュー -->
    <div id="preview-area"></div>
  </div>

  <!-- メモカード -->
  <div class="card">
    <div class="card-title">社労士へのメモ（任意）</div>
    <textarea id="memo" placeholder="例）3月分の給与明細です。前月と変更あり。"></textarea>
  </div>

  <!-- 送信ボタン -->
  <button class="btn-submit" id="submit-btn" onclick="submitForm()">
    <span id="submit-icon">📤</span>
    <span id="submit-label">送信する</span>
  </button>

</div>

<script>
  // ============================================================
  // 定数：n8n Webhook URL をここに設定してください
  // ============================================================
  const N8N_WEBHOOK_URL = "https://n8n-production-6ba4.up.railway.app/webhook/roumu-send";
  // ============================================================

  let selectedFiles = []; // { file: File, id: number }
  let fileIdCounter = 0;

  // --- カメラ起動 ---
  function openCamera() {
    document.getElementById('input-camera').value = '';
    document.getElementById('input-camera').click();
  }

  // --- ファイル選択 ---
  function openFilePicker() {
    document.getElementById('input-file').value = '';
    document.getElementById('input-file').click();
  }

  // --- ファイル追加処理（共通） ---
  function addFiles(files) {
    Array.from(files).forEach(file => {
      selectedFiles.push({ file, id: fileIdCounter++ });
    });
    renderPreviews();
  }

  document.getElementById('input-camera').addEventListener('change', e => addFiles(e.target.files));
  document.getElementById('input-file').addEventListener('change', e => addFiles(e.target.files));

  // --- プレビュー描画 ---
  function renderPreviews() {
    const area = document.getElementById('preview-area');

    if (selectedFiles.length === 0) {
      area.innerHTML = '';
      return;
    }

    let html = `<div class="preview-label">選択中のファイル</div><div class="preview-grid">`;

    selectedFiles.forEach(({ file, id }) => {
      if (file.type.startsWith('image/')) {
        const url = URL.createObjectURL(file);
        html += `
          <div class="preview-item" id="item-${id}">
            <img src="${url}" alt="${escapeHtml(file.name)}" onload="URL.revokeObjectURL(this.src)">
            <button class="remove-btn" onclick="removeFile(${id})" aria-label="削除">✕</button>
          </div>`;
      } else {
        const ext = file.name.split('.').pop().toUpperCase();
        html += `
          <div class="preview-item" id="item-${id}">
            <div class="file-icon">
              <span class="fi-icon">📄</span>
              <span class="fi-name">${escapeHtml(file.name)}</span>
            </div>
            <button class="remove-btn" onclick="removeFile(${id})" aria-label="削除">✕</button>
          </div>`;
      }
    });

    html += `</div><div class="preview-count">${selectedFiles.length} 件のファイルが選択されています</div>`;
    area.innerHTML = html;
  }

  // --- ファイル削除 ---
  function removeFile(id) {
    selectedFiles = selectedFiles.filter(f => f.id !== id);
    renderPreviews();
  }

  // --- XSS対策 ---
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- メッセージ表示 ---
  function showMessage(type, text) {
    const area = document.getElementById('msg-area');
    const icon = type === 'success' ? '✅' : '❌';
    area.innerHTML = `
      <div class="msg msg-${type}">
        <span class="msg-icon">${icon}</span>
        <span>${escapeHtml(text)}</span>
      </div>`;
    area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function clearMessage() {
    document.getElementById('msg-area').innerHTML = '';
  }

  // --- 送信中UI ---
  function setLoading(loading) {
    const btn = document.getElementById('submit-btn');
    const icon = document.getElementById('submit-icon');
    const label = document.getElementById('submit-label');
    if (loading) {
      btn.disabled = true;
      icon.outerHTML = '<span class="spinner" id="submit-icon"></span>';
      label.textContent = '送信中…';
    } else {
      btn.disabled = false;
      document.getElementById('submit-icon').outerHTML = '<span id="submit-icon">📤</span>';
      label.textContent = '送信する';
    }
  }

  // --- 送信処理 ---
  async function submitForm() {
    clearMessage();

    if (selectedFiles.length === 0) {
      showMessage('error', 'ファイルを1件以上選択してください。');
      return;
    }

    if (!N8N_WEBHOOK_URL || N8N_WEBHOOK_URL === 'ここにn8nのWebhook URLを入力') {
      showMessage('error', 'Webhook URLが設定されていません。管理者にお問い合わせください。');
      return;
    }

    const memo = document.getElementById('memo').value.trim();
    const formData = new FormData();

    selectedFiles.forEach(({ file }, index) => {
      formData.append(`file_${index}`, file, file.name);
    });

    formData.append('fileCount', selectedFiles.length);
    formData.append('memo', memo);

    setLoading(true);

    try {
      const response = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        body: formData,
      });

      if (response.ok) {
        showMessage('success', '送信が完了しました。社労士に届きました。');
        // リセット
        selectedFiles = [];
        fileIdCounter = 0;
        document.getElementById('memo').value = '';
        renderPreviews();
      } else {
        showMessage('error', `送信に失敗しました（エラーコード: ${response.status}）。再度お試しください。`);
      }
    } catch (err) {
      showMessage('error', 'ネットワークエラーが発生しました。Wi-Fi接続を確認してください。');
    } finally {
      setLoading(false);
    }
  }
</script>

</body>
</html>
